<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0a0c10 0%, #12151c 100%);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    color: #f1f5f9;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .accent-bar {
    width: 4px;
    height: 80px;
    background: linear-gradient(180deg, #10b981, #14b8a6, #f59e0b);
    border-radius: 2px;
    margin-bottom: 28px;
  }
  h1 { font-size: 56px; font-weight: 700; letter-spacing: -0.02em; }
  .title { font-size: 30px; color: #10b981; margin-top: 12px; font-weight: 600; }
  .tagline { font-size: 22px; color: #94a3b8; margin-top: 20px; line-height: 1.4; }
  .meta { font-size: 18px; color: #64748b; margin-top: 16px; font-family: ui-monospace, monospace; }
  .footer {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    border-top: 1px solid #1e293b;
    padding-top: 24px;
    font-size: 16px;
    color: #64748b;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <h1>Anbarasan C</h1>
  <p class="title">Senior Backend Engineer</p>
  <p class="tagline">Rails | Sidekiq | Kafka | AI Platform | Team Lead</p>
  <p class="meta">5+ yrs | DispatchTrack | Chennai, India</p>
  <div class="footer">anbarasanc01@gmail.com | linkedin.com/in/anbarasanc</div>
</body>
</html>
